- name: Install fastfetch
  become: true
  community.general.pacman:
    update_cache: false
    name:
      - fastfetch
    state: present
  register: pkg_output

- name: Show installed packages
  ansible.builtin.debug:
    msg: "{{ ['Installed packages:'] + pkg_output.packages }}"
  when: pkg_output.changed

- name: Ensure fastfetch config directory exists
  ansible.builtin.file:
    path: "{{ fastfetch_config_dir }}"
    state: directory
    mode: '0755'

- name: Symlink fastfetch config
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
  loop:
    - { src: "neofetch.jsonc", dest: "{{ fastfetch_config_dir }}/config.jsonc" }
