- name: Arch/Artix
  ansible.builtin.include_tasks: "arch.yml"
  when: ansible_distribution | lower == 'archlinux' or ansible_distribution | lower == 'artix linux'

- name: Alpine
  ansible.builtin.include_tasks: "alpine.yml"
  when: ansible_distribution | lower == 'alpine'

- name: Ensure fastfetch config directory exists
  ansible.builtin.file:
    path: "{{ fastfetch_config_dir }}"
    state: directory
    mode: '0755'

- name: Symlink fastfetch config
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
  loop:
    - { src: "neofetch.jsonc", dest: "{{ fastfetch_config_dir }}/config.jsonc" }
