- name: Install docker
  become: true
  community.general.pacman:
    update_cache: false
    name:
      - docker
      - docker-openrc
      - docker-compose
      - docker-buildx
      - fuse-overlayfs
    state: present
  register: pkg_output

- name: Show installed packages
  ansible.builtin.debug:
    msg: "{{ ['Installed packages:'] + pkg_output.packages }}"
  when: pkg_output.changed

- name: "Make sure user {{ ansible_facts.env.USER }} is a member of docker group"
  become: true
  ansible.builtin.user:
    name: "{{ ansible_facts.user_id }}"
    append: true
    groups:
      - docker

- name: Start/enable docker service
  become: true
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true