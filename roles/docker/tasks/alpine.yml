- ansible.builtin.include_role:
    name: pkg
    tasks_from: apk
  vars:
    packages:
      - docker
      - docker-cli-compose
      - docker-cli-buildx

- name: "Make sure user {{ ansible_facts.env.USER }} is a member of docker group"
  become: true
  ansible.builtin.user:
    name: "{{ ansible_facts.user_id }}"
    append: true
    groups:
      - docker

- name: Start/enable docker service
  become: true
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started
