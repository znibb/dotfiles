- name: Artix-specific
  ansible.builtin.include_tasks: "artix.yml"
  when: ansible_distribution | lower == 'artix linux'

- name: Arch/Artix
  ansible.builtin.include_tasks: "arch.yml"
  when: ansible_distribution | lower == 'archlinux' or ansible_distribution | lower == 'artix linux'

- name: Enable/start power-profiles-daemon
  become: true
  ansible.builtin.service:
    name: power-profiles-daemon
    enabled: true
    state: started

- name: Ensure relevant system directories exists
  become: true
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: '0755'
  loop:
    - { path: /etc/sddm.conf.d }

- name: Ensure KDE-relevant directories exists
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: '0755'
  loop:
    - { path: "{{ user_scripts_dir }}" }
    - { path: "{{ kde_config_dir }}" }

- name: Symlink KDE-relevant files
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
  loop:
    - { src: "toggle_headset_speaker.sh",   dest: "{{ user_scripts_dir }}/toggle_headset_speaker.sh" }
    - { src: "kxkbrc",                      dest: "{{ kde_config_dir }}/kxkbrc" }