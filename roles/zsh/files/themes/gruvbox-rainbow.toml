"$schema" = 'https://starship.rs/config-schema.json'

## Select palette
palette = 'gruvbox'

## Prompt assembly
format = """
[ŅéČ](color_bg0)\
$os\
$hostname\
[Ņé░](fg:color_bg0 bg:color_bg1)\
$username\
[Ņé░](fg:color_bg1 bg:color_bg2)\
$directory\
[Ņé░](fg:color_bg2 bg:color_bg3)\
$git_branch\
$git_status\
[Ņé░](fg:color_bg3 bg:color_bg4)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Ņé░](fg:color_bg4 bg:color_bg5)\
$docker_context\
$conda\
[Ņé░](fg:color_bg5 bg:color_bg6)\
$nix_shell\
[Ņé┤ ](fg:color_bg6)\
$line_break$character"""

## Formatting
right_format = """
$cmd_duration"""

scan_timeout = 30
command_timeout = 3600000

# continuation_prompt = '[’É▓’É▓]'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[’É▓](bold fg:color_green)'
error_symbol = '[’É▓](bold fg:color_bg0)'
vimcmd_symbol = '[’É┤](bold fg:color_green)'
vimcmd_replace_one_symbol = '[’É┤](bold fg:color_replace)'
vimcmd_replace_symbol = '[’É┤](bold fg:color_replace)'
vimcmd_visual_symbol = '[’É┤](bold fg:color_bg2)'

[cmd_duration]
min_time = 1
show_milliseconds = true
style = 'bold yellow'
format = 'took [$duration]($style)'

## Core modules
[os]
disabled = false
style = "fg:color_fg0 bg:color_bg0"

[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "¾░ĆĄ"
Manjaro = "’īÆ"
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "Ņ£Ä"
Arch = "¾░Żć"
Artix = "¾░Żć"
EndeavourOS = "’åŚ"
CentOS = "’īä"
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = "’ī¬"

[hostname]
disabled = false
ssh_only = false
ssh_symbol = "’Æē"
trim_at = ""
detect_env_vars = []
style = "fg:color_fg0 bg:color_bg0"
format = "[ $hostname $ssh_symbol ]($style)"

[username]
show_always = true
style_user = "fg:color_fg0 bg:color_bg1"
style_root = "fg:color_fg0 bg:color_bg1"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_bg2"
format = "[ $path ]($style)"
home_symbol = "~"
truncation_length = 5
truncation_symbol = "ŌĆ”/"
truncate_to_repo = true

# [directory.substitutions]
# "Documents" = "¾░łÖ "
# "Downloads" = "’ĆÖ "
# "Music" = "¾░ØÜ "
# "Pictures" = "’ĆŠ "
# "Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
style = "bg:color_bg3"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_bg3)]($style)'

[git_status]
style = "bg:color_bg3"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_bg3)]($style)'

## Extra modules
[c]
symbol = "Ņś× "
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg4)]($style)'

[conda]
style = "bg:color_bg5"
format = '[[ $symbol( $environment) ](fg:#83a598 bg:color_bg5)]($style)'

[docker_context]
symbol = "’īł"
style = "bg:color_bg5"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg5)]($style)'

[golang]
symbol = "Ņś¦"
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg4)]($style)'

[haskell]
symbol = "Ņś¤"
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg4)]($style)'

[java]
symbol = "Ņē¢"
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg4)]($style)'

[kotlin]
symbol = "Ņś┤"
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg4)]($style)'

[nix_shell]
disabled = false
impure_msg = 'impure'
pure_msg = 'pure'
unknown_msg = 'unknown'
symbol ="ŌØä’ĖÅ "
style = 'bold blue'
format = '[ via $symbol$state( \($name\))](fg:color_fg0 bg:color_bg6)'

[nodejs]
symbol = "Ņ£ś"
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg4)]($style)'

[php]
symbol = "Ņśł"
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg4)]($style)'

[python]
symbol = "Ņśå"
detect_extensions = [] # prevent triggering on presence of .py files
detect_files = [] # prevent triggering on pyproject.toml, requirements.txt etc
detect_folders = [] # prevent triggering on .venv presence
style = "bg:color_bg4"
format = '([[ $symbol( $version)( \($virtualenv\))](fg:color_fg0 bg:color_bg4)]($style))' # only show when a venv is active

[rust]
symbol = "Ņ×©"
style = "bg:color_bg4"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_bg4)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg6"
format = '[[ ’É║ $time ](fg:color_fg0 bg:color_bg6)]($style)'

