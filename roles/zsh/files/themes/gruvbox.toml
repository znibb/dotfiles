"$schema" = 'https://starship.rs/config-schema.json'

## Select palette
palette = 'gruvbox'

## Prompt assembly
format = """
[Óā∂](color_bg0)\
$os\
$hostname\
[Óāį](fg:color_bg0 bg:color_bg1)\
$username\
[Óāį](fg:color_bg1 bg:color_bg2)\
$directory\
[Óāį](fg:color_bg2 bg:color_bg3)\
$git_branch\
$git_status\
[Óāį](fg:color_bg3 bg:color_bg4)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Óāį](fg:color_bg4 bg:color_bg5)\
$docker_context\
$conda\
[Óāį](fg:color_bg5 bg:color_bg6)\
$nix_shell\
[Óāī ](fg:color_bg6)\
$line_break$character"""

## Formatting
right_format = """
$cmd_duration"""

scan_timeout = 30
command_timeout = 3600000

# continuation_prompt = '[Ôź≤Ôź≤]'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[Ôź≤](bold fg:color_green)'
error_symbol = '[Ôź≤](bold fg:color_bg0)'
vimcmd_symbol = '[Ôźī](bold fg:color_green)'
vimcmd_replace_one_symbol = '[Ôźī](bold fg:color_replace)'
vimcmd_replace_symbol = '[Ôźī](bold fg:color_replace)'
vimcmd_visual_symbol = '[Ôźī](bold fg:color_bg2)'

[cmd_duration]
min_time = 1
show_milliseconds = true
style = 'bold yellow'
format = 'took [$duration]($style)'

## Core modules
[os]
disabled = false
style = "fg:color_fg0 bg:color_bg0"

[os.symbols]
Windows = "ůįć≤"
Ubuntu = "ůįēą"
SUSE = "ÔĆĒ"
Raspbian = "ůįźŅ"
Mint = "ůį£≠"
Macos = "ůįÄĶ"
Manjaro = "ÔĆí"
Linux = "ůįĆĹ"
Gentoo = "ůį£®"
Fedora = "ůį£õ"
Alpine = "ÔĆÄ"
Amazon = "ÔČį"
Android = "Óúé"
Arch = "ůį£á"
Artix = "ůį£á"
EndeavourOS = "ÔÜó"
CentOS = "ÔĆĄ"
Debian = "ůį£ö"
Redhat = "ůĪĄõ"
RedHatEnterprise = "ůĪĄõ"
Pop = "ÔĆ™"

[hostname]
disabled = false
ssh_only = false
ssh_symbol = "ÔíČ"
trim_at = ""
detect_env_vars = []
style = "fg:color_fg0 bg:color_bg0"
format = "[ $hostname $ssh_symbol ]($style)"

[username]
show_always = true
style_user = "fg:color_fg0 bg:color_bg1"
style_root = "fg:color_fg0 bg:color_bg1"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_bg2"
format = "[ $path ]($style)"
home_symbol = "~"
truncation_length = 5
truncation_symbol = "‚Ä¶/"
truncate_to_repo = true

# [directory.substitutions]
# "Documents" = "ůįąô "
# "Downloads" = "ÔÄô "
# "Music" = "ůįĚö "
# "Pictures" = "ÔÄĺ "
# "Developer" = "ůį≤č "

[git_branch]
symbol = "Ôźė"
style = "bg:color_bg3"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_bg3)]($style)'

[git_status]
style = "bg:color_bg3"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_bg3)]($style)'

