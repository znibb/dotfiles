"$schema" = 'https://starship.rs/config-schema.json'

## Select palette
palette = 'gruvbox'

## Prompt assembly
format = """
[¯éÂ](color_bg0)\
$os\
$hostname\
[¯é░](fg:color_bg0 bg:color_bg1)\
$username\
[¯é░](fg:color_bg1 bg:color_bg2)\
$directory\
[¯é░](fg:color_bg2 bg:color_bg3)\
$git_branch\
$git_status\
[¯é░](fg:color_bg3 bg:color_bg4)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[¯é░](fg:color_bg4 bg:color_bg5)\
$docker_context\
$conda\
[¯é░](fg:color_bg5 bg:color_bg6)\
$nix_shell
[¯é┤ ](fg:color_bg6)\
$line_break$character"""

## Formatting
right_format = """
$cmd_duration"""

scan_timeout = 30
command_timeout = 3600000

# continuation_prompt = '[´É▓´É▓]'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[´É▓](bold fg:color_green)'
error_symbol = '[´É▓](bold fg:color_bg0)'
vimcmd_symbol = '[´É┤](bold fg:color_green)'
vimcmd_replace_one_symbol = '[´É┤](bold fg:color_replace)'
vimcmd_replace_symbol = '[´É┤](bold fg:color_replace)'
vimcmd_visual_symbol = '[´É┤](bold fg:color_bg2)'

[cmd_duration]
min_time = 1
show_milliseconds = true
style = 'bold yellow'
format = 'took [$duration]($style)'

## Core modules
[os]
disabled = false
style = "fg:color_fg0 bg:color_bg0"

[os.symbols]
Windows = "¾░ì▓"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
Arch = "¾░úç"
Artix = "¾░úç"
EndeavourOS = "´åù"
CentOS = "´îä"
Debian = "¾░úÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"
Pop = "´î¬"

[hostname]
disabled = false
ssh_only = false
ssh_symbol = "´Æë"
trim_at = ""
detect_env_vars = []
style = "fg:color_fg0 bg:color_bg0"
format = "[ $hostname $ssh_symbol ]($style)"

[username]
show_always = true
style_user = "fg:color_fg0 bg:color_bg1"
style_root = "fg:color_fg0 bg:color_bg1"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_bg2"
format = "[ $path ]($style)"
home_symbol = "~"
truncation_length = 5
truncation_symbol = "ÔÇª/"
truncate_to_repo = true

# [directory.substitutions]
