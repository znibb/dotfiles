- name: Install pacman packages
  become: true
  community.general.pacman:
    update_cache: true
    name:
      # Yay prereqs
      - base-devel

      # System
      - git
      - tree
      - btop
      - speedtest-cli
      - fastfetch
      - tldr
      - bat
      - zsh
      - ttf-meslo-nerd # Font for Starship prompt
      - man
      - tmux
      - neovim
      - unzip

      # Desktop
      - ghostty
      - firefox
      - discord
      - spotify-launcher
      - thunderbird
    state: present

- name: Check for yay binary
  ansible.builtin.stat:
    path: "/usr/bin/{{ aur_helper }}"
  register: bin_file

- name: Clone yay source
  ansible.builtin.git:
    repo: "https://aur.archlinux.org/{{ aur_helper }}.git"
    dest: "{{ aur_helper_dir }}"
  register: source_cloned
  when: not bin_file.stat.exists

- name: Build and install yay
  ansible.builtin.command:
    chdir: "{{ aur_helper_dir }}"
    cmd: makepkg -si --noconfirm
    creates: "/usr/bin/{{ aur_helper }}"
  when: not bin_file.stat.exists

- name: Remove build files for yay
  ansible.builtin.file:
    path: "{{ aur_helper_dir }}"
    state: absent
  when: source_cloned is defined

- name: Install AUR packages
  kewlfft.aur.aur:
    use: "{{ aur_helper }}"
    name:
      - vscodium-bin
      - starship
    state: present
