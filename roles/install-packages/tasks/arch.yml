- name: Install pacman packages
  become: true
  community.general.pacman:
    update_cache: true
    name:
      # Yay prereqs
      - base-devel

      # System
      - git
      - tree
      - btop
      - speedtest-cli
      - neofetch
      - tldr
      - bat
      - zsh
      - man
      - tmux
      - neovim
      - unzip

      # Desktop
      - ghostty
      - firefox
      - discord
      - spotify-launcher
      - thunderbird
    state: present

- name: Check for yay binary
  ansible.builtin.stat:
    path: /usr/bin/yay
  register: bin_file

- name: Clone yay source
  ansible.builtin.git:
    repo: https://aur.archlinux.org/yay.git
    dest: /tmp/.yay
  register: cloned
  when: not bin_file.stat.exists

- name: Build and install yay
  ansible.builtin.command:
    chdir: /tmp/.yay
    cmd: makepkg -si --noconfirm
    creates: /usr/bin/yay
  when: not bin_file.stat.exists

- name: Remove build files for yay
  ansible.builtin.file:
    path: /tmp/.yay
    state: absent
  when: cloned is defined

- name: Install AUR packages
  kewlfft.aur.aur:
    use: yay
    name:
      - vscodium-bin
    state: present
