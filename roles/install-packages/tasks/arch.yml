- name: Arch | Install pacman packages
  become: true
  community.general.pacman:
    update_cache: true
    name:
      # Yay prereqs
      - base-devel
      - git

      # System
      - tree
      - btop
      - speedtest-cli
      - neofetch
      - tldr
      - bat
      - zsh
      - man

      # Desktop
      - ghostty
      - firefox
      - discord
      - spotify-launcher
      - thunderbird
    state: present

- name: "Check for {{ aur_helper }}"
  stat:
    path: "/usr/bin/{{ aur_helper }}"
  register: bin_file

- name: "Clone {{ aur_helper }} source"
  ansible.builtin.git:
    repo: "https://aur.archlinux.org/{{ aur_helper }}.git"
    dest: "{{ aur_helper_dir }}"
  register: cloned
  when: not bin_file.stat.exists

- name: "Build {{ aur_helper }}"
  ansible.builtin.command:
    chdir: "{{ aur_helper_dir }}"
    cmd: makepkg -s
    creates: "{{ aur_helper_dir }}/pkg"
  when: not bin_file.stat.exists

- name: Arch | Install AUR packages
  kewlfft.aur.aur:
    use: yay
    name:
      - vscodium-bin
    state: present
