- name: Install StreamController packages
  kewlfft.aur.aur:
    use: "{{ aur_helper }}"
    update_cache: true
    name:
      - streamcontroller # Stream Deck control software
      - kdotool # Window detection dependancy
    state: present
  register: pkg_output

- name: Show installed packages
  ansible.builtin.debug:
    msg: "{{ ['Installed packages:'] + pkg_output.packages }}"
  when: pkg_output.changed

- name: Ensure StreamController static config directory exists
  ansible.builtin.file:
    path: "{{ static_config_dir }}"
    state: directory
    mode: '0755'

- name: Write StreamController static settings
  ansible.builtin.copy:
    content: |
      {
        "data-path": "{{ StreamController_config_dir }}"
      }
    dest: "{{ static_config_dir }}/settings.json"
    mode: '0644'

- name: Find cv2 config-3.py in StreamController Python environment
  ansible.builtin.find:
    paths: /usr/local/lib/streamcontroller
    patterns: "config-3.py"
    recurse: true
  register: cv2_config_files

- name: Disable cv2 Qt plugin path overrides to prevent system Qt5 apps (e.g. VLC) from crashing
  ansible.builtin.replace:
    path: "{{ item.path }}"
    regexp: 'ci_and_not_headless = ci_build and not headless'
    replace: 'ci_and_not_headless = False  # Disabled: bundled Qt plugins incompatible with system Qt5'
  loop: "{{ cv2_config_files.files }}"
  when: cv2_config_files.files | length > 0
  become: true
