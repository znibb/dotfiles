# Use best available video+audio quality, capped at 1080p
-f "bestvideo[height<=1080]+bestaudio/best[height<=1080]"

# Merge into mkv container
--merge-output-format mkv

# Output filename template (spaces replaced with underscores)
-o "%(title)s.%(ext)s"
--restrict-filenames

# Add metadata and thumbnail to file
--embed-metadata
--embed-thumbnail
