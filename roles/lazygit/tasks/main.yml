- name: Arch/Artix
  ansible.builtin.include_tasks: "arch.yml"
  when: ansible_distribution | lower == 'archlinux' or ansible_distribution | lower == 'artix linux'

- name: Alpine
  ansible.builtin.include_tasks: "alpine.yml"
  when: ansible_distribution | lower == 'alpine'

- name: Ensure lazygit config directory exists
  ansible.builtin.file:
    path: "{{ lazygit_config_dir }}"
    state: directory
    mode: '0755'

- name: Symlink lazygit config
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: true
  loop:
    - { src: "config.yml", dest: "{{ lazygit_config_dir }}/config.yml" }