- name: Install tmux
  become: true
  community.general.apk:
    update_cache: false
    name:
      - tmux
      - entr # Run arbitrary commands on file change, needed for tmux-autoreload plugin
      - ncurses # Required for tmux-256color to be present
      - ncurses-terminfo
      - ncurses-terminfo-base
    state: present
  register: pkg_output

- name: Show installed packages
  ansible.builtin.debug:
    msg: "{{ ['Installed packages:'] + pkg_output.packages }}"
  when: pkg_output.changed
