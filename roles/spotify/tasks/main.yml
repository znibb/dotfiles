- name: Install Spotify
  kewlfft.aur.aur:
    use: "{{ aur_helper }}"
    update_cache: true
    name:
      - spotify
    state: present
  register: pkg_output

- name: Show installed packages
  ansible.builtin.debug:
    msg: "{{ ['Installed packages:'] + pkg_output.installed }}"
  when: pkg_output.changed

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.local/bin"
    state: directory
    mode: '0755'

- name: Symlink xdg-open wrapper
  ansible.builtin.file:
    src: "{{ role_path }}/files/xdg-open"
    dest: "{{ ansible_facts.env.HOME }}/.local/bin/xdg-open"
    state: link

- name: Ensure xdg-open wrapper is executable
  ansible.builtin.file:
    path: "{{ role_path }}/files/xdg-open"
    mode: '0755'
