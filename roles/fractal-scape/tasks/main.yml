- name: Install AUR packages
  kewlfft.aur.aur:
    use: "{{ aur_helper }}"
    update_cache: false
    name:
      - fractal-udev
    state: present
  register: pkg_output

- name: Show installed packages
  ansible.builtin.debug:
    msg: "{{ ['Installed packages:'] + pkg_output.installed }}"
  when: pkg_output.changed

- name: Setup udev rules for headset
  become: true
  ansible.builtin.copy:
    src: "{{ role_path }}/files/50-fractal.rules"
    dest: /etc/udev/rules.d/50-fractal.rules
    mode: '0755'
    owner: root
    group: root
    force: false