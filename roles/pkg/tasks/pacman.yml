- name: Install pacman packages
  become: true
  community.general.pacman:
    update_cache: "{{ pkg_update_cache | default(false) }}"
    name: "{{ packages }}"
    state: present
  register: pkg_output
  changed_when: pkg_output.packages | length > 0

- name: Show installed packages
  ansible.builtin.debug:
    msg: "{{ pkg_output.packages }}"
  when: pkg_output.changed
