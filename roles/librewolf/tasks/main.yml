- name: Install librewolf
  kewlfft.aur.aur:
    use: "{{ aur_helper }}"
    update_cache: false
    name:
      - librewolf
      - librewolf-extension-keepassxc-browser
    state: present
  register: pkg_output

- name: Show installed packages
  ansible.builtin.debug:
    msg: "{{ ['Installed packages:'] + pkg_output.installed }}"
  when: pkg_output.changed

- name: Ensure librewolf config directory exists
  ansible.builtin.file:
    path: "{{ librewolf_config_dir }}"
    state: directory
    mode: '0755'

- name: Symlink librewolf config
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
  loop:
    - { src: "librewolf.overrides.cfg", dest: "{{ librewolf_config_dir }}/librewolf.overrides.cfg" }

