- ansible.builtin.include_role:
    name: pkg
    tasks_from: pacman
  vars:
    packages:
      - avr-gdb   # debugger
      - avr-gcc   # compiler
      - avr-libc  # libraries
      - avrdude   # firmware download
      - make      # build system

- name: "Ensure {{ ansible_facts.user_id }} is a member of uucp group"
  become: true
  ansible.builtin.user:
    name: "{{ ansible_facts.user_id }}"
    append: true
    groups:
      - uucp

- name: Setup udev rules for programmers
  become: true
  ansible.builtin.copy:
    src: "{{ role_path }}/files/99-avrprogrammers.rules"
    dest: /etc/udev/rules.d/99-avrprogrammers.rules
    mode: '0755'
    owner: root
    group: root
    force: false
