- name: Install pacman packages
  become: true
  community.general.pacman:
    update_cache: false
    name:
      - vlc
      - vlc-plugins-all
    state: present
  register: pkg_output

- name: Show installed packages
  ansible.builtin.debug:
    msg: "{{ ['Installed packages:'] + pkg_output.packages }}"
  when: pkg_output.changed
